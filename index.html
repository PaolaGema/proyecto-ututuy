        <style>
            body, html {
                margin: 0;
                padding: 0;
                background-color: #1a0b2e;
                font-family: 'Inter', sans-serif;
                overflow-x: hidden;
            }
            .loader_container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
            }
            
            /* Animación de carga con colores Ututuy */
            .wrapper {
                width: 170px;
                height: 60px;
                position: relative;
                z-index: 1;
            }

            .circle {
                width: 20px;
                height: 20px;
                position: absolute;
                border-radius: 50%;
                background-color: #FFB800; /* Amarillo Jukumari */
                left: 15%;
                transform-origin: 50%;
                animation: circle_bounce 0.5s alternate infinite ease;
            }

            @keyframes circle_bounce {
                0% {
                    top: 60px;
                    height: 5px;
                    border-radius: 50px 50px 25px 25px;
                    transform: scaleX(1.7);
                }
                40% {
                    height: 20px;
                    border-radius: 50%;
                    transform: scaleX(1);
                }
                100% {
                    top: 0%;
                }
            }

            .circle:nth-child(2) { left: 45%; background-color: #8e4dff; animation-delay: 0.2s; }
            .circle:nth-child(3) { left: auto; right: 15%; background-color: #FFB800; animation-delay: 0.3s; }

            .shadow {
                width: 20px;
                height: 4px;
                border-radius: 50%;
                background-color: rgba(0, 0, 0, 0.4);
                position: absolute;
                top: 62px;
                left: 15%;
                filter: blur(1px);
                animation: shadow_pulse 0.5s alternate infinite ease;
            }

            @keyframes shadow_pulse {
                0% { transform: scaleX(1.5); }
                40% { transform: scaleX(1); opacity: 0.7; }
                100% { transform: scaleX(0.2); opacity: 0.4; }
            }

            .shadow:nth-child(4) { left: 45%; animation-delay: 0.2s; }
            .shadow:nth-child(5) { left: auto; right: 15%; animation-delay: 0.3s; }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="loader_container">
                <div class="wrapper">
                    <div class="circle"></div>
                    <div class="circle"></div>
                    <div class="circle"></div>
                    <div class="shadow"></div>
                    <div class="shadow"></div>
                    <div class="shadow"></div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
